services:
  - type: web
    name: swiss-tariff-hub
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swiss-tariff-db
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: ADMIN_KEY
        sync: false
      - key: TOTP_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: EMAIL_LANG
        value: it
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: APP_URL
        sync: false

databases:
  - name: swiss-tariff-db
    plan: free
    region: frankfurt
    databaseName: tariffs
    user: tariffs