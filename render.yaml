services:
  - type: web
    name: swiss-tariff-hub
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: swiss-tariff-db
          property: connectionString
      - key: ALERT_EMAIL
        sync: false
      - key: EMAIL_LANG
        value: it
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: swiss-tariff-db
    plan: free
    region: frankfurt
    databaseName: tariffs
    user: tariffs